<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro</title>
  <link rel="stylesheet" href="register.css">
  <link rel="shortcut icon" href="public/img/twins.png">
</head>
<body>
  <div class="register-container">
    <h2>Regístrate</h2>
    <form>
      <div class="form-group">
        <label for="usua_identificacion">Número de documento</label>
        <input type="number" id="usua_identificacion" name="usua_identificacion">
      </div>

      <div class="form-group">
        <label for="usua_tipoidentificacion">Tipo de documento</label>
        <select id="usua_tipoidentificacion" name="usua_tipoidentificacion">
          <option>Cédula de ciudadanía</option>
          <option>Cédula de extranjería</option>
          <option>Tarjeta de extranjería</option>
          <option>Pasaporte</option>
          <option>NUIP</option>
          <option>NIT de otro país</option>
        </select>
      </div>

      <div class="form-group">
        <label for="usua_nombre">Nombres</label>
        <input type="text" id="usua_nombre" name="usua_nombre">
      </div>
      
      <div class="form-group">
        <label for="usua_apellido">Apellidos</label>
        <input type="text" id="usua_apellido" name="usua_apellido">
      </div>

      <div class="form-group">
        <label for="usua_celular">Celular</label>
        <input type="number" id="usua_celular" name="usua_celular">
      </div>

      <div class="form-group">
        <label for="usua_direccion">Dirección</label>
        <input type="text" id="usua_direccion" name="usua_direccion">
      </div>

      <div class="form-group">
        <label for="usua_usuario">Usuario</label>
        <input type="text" id="usua_usuario" name="usua_usuario">
      </div>

      <div class="form-group">
        <label for="usua_password">Contraseña</label>
        <input type="password" id="usua_password" name="usua_password">
      </div>

      <div class="form-group">
        <label for="usua_rol_fk">Rol</label>
        <select id="usua_rol_fk" name="usua_rol_fk">
          <option disabled>Administrador</option>
          <option selected>Usuario</option>
        </select>
      </div>

      <a href="index.html"><button type="submit">Registrarse</button></a>
    </form>
    <a href="index.html" class="back-link">Volver</a>
  </div>
</body>
</html>
